apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-tracker
  namespace: task-tracker
  annotations:
    kubernetes.io/ingress.class: alb
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: task-tracker
            port:
              number: 80
