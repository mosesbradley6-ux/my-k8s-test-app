apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: task-tracker
  namespace: task-tracker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: task-tracker
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
